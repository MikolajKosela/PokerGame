<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="/static/css/style.css"
    />
    
    <title>Poker online</title>
  </head>
  <body>
    <h1>Twoja runda</h1>
    <h2>Wspólne karty</h2>
    <ul id="commonCards"></ul>

    <h2>Twoje karty</h2>
    <ul id="yourCards"></ul>
    <h3 id="pot"></h3>
    <h3 id="credits"></h3>

    <button id="check" class="btn" type="submit">Czekaj</button>

    <div class="cont">
      <button id="bet" class="btnl" type="submit">Postaw zakład</button>
      <input id="betValue" class="numInput" type="number" min="1" step="1" value="1">
      <button id="minus" class="btn" type="button">-</button>
      <button id="plus" class="btnr" type="button">+</button>
    </div>

    <button id="call" class="btn" type="submit">Sprawdź (...)</button>

    <div class="cont">
      <button id="raise" class="btnl" type="submit">Podbij</button>
      <input id="raiseValue" class="numInput" type="number" min="1" step="1" value="1">
      <button id="minus" class="btn" type="button">-</button>
      <button id="plus" class="btnr" type="button">+</button>
    </div>

    <button id="fold" class="btn" type="submit">Pasuj</button>
    <button id="allin" class="btn" type="submit">ALL IN 🔥🔥🔥</button>

    <h3>Inni gracze:</h3>
    <ul id="players"></ul>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/socket.js"></script>
    <script src="/static/js/action.js"></script>

  </body>
</html>
